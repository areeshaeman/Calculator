<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CalcPro - Scientific Calculator</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="navbar">
      <div class="logo">🧮 CalcPro</div>
    </header>

    <section class="calculator-section">
      <div class="calculator">
        <div class="display">
          <input type="text" placeholder="0" id="input" disabled />
        </div>
        <!-- SIMPLE CALCULATOR -->
        <div class="buttons" id="simpleCalc">
          <input type="button" value="7" class="input-button" />
          <input type="button" value="8" class="input-button" />
          <input type="button" value="9" class="input-button" />
          <input type="button" value="/" class="input-button" />

          <input type="button" value="4" class="input-button" />
          <input type="button" value="5" class="input-button" />
          <input type="button" value="6" class="input-button" />
          <input type="button" value="*" class="input-button" />

          <input type="button" value="1" class="input-button" />
          <input type="button" value="2" class="input-button" />
          <input type="button" value="3" class="input-button" />
          <input type="button" value="-" class="input-button" />

          <input type="button" value="0" class="input-button" />
          <input type="button" value="." class="input-button" />
          <input type="button" value="+" class="input-button" />
          <input type="button" value="=" id="equal" />
          <input type="button" value="C" id="clear" />
          <input type="button" value="DEL" id="erase" />

          <input type="button" value="Scientific" id="showSci" />
        </div>

        <!-- SCIENTIFIC CALCULATOR -->

        <div class="buttons sci" id="sciCalc">
          <input type="button" value="sin" id="sin" />
          <input type="button" value="cos" id="cos" />
          <input type="button" value="tan" id="tan" />
          <input type="button" value="log" id="log" />

          <input type="button" value="ln" id="ln" />
          <input type="button" value="√" id="sqrt" />
          <input type="button" value="x²" id="pow" />
          <input type="button" value="x³" id="cube" />

          <input type="button" value="π" id="pi" />
          <input type="button" value="e" id="e" />
          <input type="button" value="1/x" id="inverse" />
          <input type="button" value="!" id="fact" />

          <input type="button" value="%" id="percent" />

          <input type="button" value="Simple" id="showSimple" />
        </div>
      </div>
    </section>

    <footer class="footer">
      <p>© 2025 CalcPro. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
